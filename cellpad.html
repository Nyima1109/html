<!DOCTYPE html> #cell sopacing and cell padding
<head><title>cell</title>
</head>
<body>
    <table>
    <h1>without cellpadding</h1>
    <table border=" 15"<p style="color: red;">Red text</p>>
    <tr>
        <td>first</td>
        <td>second</td>
    </tr>
    <tr>
        <td>second</td>
        <td>row</td>
    </tr>
    </table>
   <h1>with cellpadding</h1>
    <table border=" 14"cellpadding=30<p style="color: blue;">Red text</p>>
    <tr>
        <td>first</td>
        <td>second</td>
    </tr>
    <tr
        <td>second</td>
        <td>row</td>
    </tr> 
</body>
</html>
