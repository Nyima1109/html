<!DOCTYPE html>
<html lang="en">
<head>
<style>
    div{
        margin: 1000px, 5000px, 3000px, 2000px;
width:300px;
padding: 10px;
margin: 100px;
border-width:5px;
border-color: blueviolet;
    }
    .dotted{
        border-style: dotted;
        color:blue
    }
    .solid{
        border-style:solid;
        border-color:green
    }
    .double{
        border-style: double;
        border-color:aquamarine
    }
.dashed{
border-style: dashed;
border-color:aqua
}
.groove{
border-style: groove;
border-color:brown

}
.inset{
border-style: inset;
border-color:black
}
</style>
</head>
<body>
    <h1>border style examples</h1>
    <div class="dotted">dotted</div>
    <div class="dashed">dashed</div>
    <div class="groove">groove</div>
    <div class="double">double</div>
    <div class="solid">solid</div>
    <div class="inset">inset</div>
</body>
</html>
