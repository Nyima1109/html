<!DOCTYPE html>
<html lang="en">
<head>
<style>
    div{
        margin: 1000px, 5000px, 3000px, 2000px;
width:300px;
padding: 10px;
margin: 100px;
border-width:5px;
border-color: blueviolet;
    }
    div.a{
        text-align: left;
    }
div.b{
        text-align: right;
    }
    div.c{
        text-align: justify;
    }
</style>
</head>
<body>
    <h1>text align property</h1>
    <div class="a">
        <h1>text align</h1>
        <p>This is simple text in left</p>
        </div>
    <div class="b">
        <h1>text align</h1>
        <p>This is simple text in right</p>
        </div>
    <div class="c">
        <h1>text align</h1>
        <p>This is simple text justify</p>
    </div>
</body>
</html>
